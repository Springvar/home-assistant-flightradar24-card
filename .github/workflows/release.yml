name: Build and attach Rollup artifact to release

# Triggers:
# - When a tag matching v* is pushed (including force updates)
# - When a release is published (typical "create release" flow)
# - Manual dispatch (useful to create a release from the UI)
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for release (e.g. v1.2.3)'
        required: true
      name:
        description: 'Release name'
        required: false
      body:
        description: 'Release notes'
        required: false
      prerelease:
        description: 'Pre-release? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js 20 and Yarn cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Cache yarn cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.config/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies (Yarn)
        run: yarn install --frozen-lockfile

      - name: Determine tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Inject release tag as card version
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sed -i "0,/___CARD_VERSION___/s//${VERSION}/" flightradar24-card.ts

      - name: Build (Rollup)
        run: yarn build

      # Use softprops/action-gh-release for all scenarios
      # This will create a new release or update an existing one
      # When updating an existing release, it preserves the existing metadata
      - name: Create or update release with assets (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.name }}
          body: ${{ github.event.inputs.body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            dist/home-assistant-flightradar24-card.js
            README.md
            LICENSE

      - name: Create or update release with assets (tag push or release event)
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: |
            dist/home-assistant-flightradar24-card.js
            README.md
            LICENSE